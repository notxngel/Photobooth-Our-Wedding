<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin local — Matamoro's Wedding</title>
    <meta name="theme-color" content="#0F0C09">
    <meta name="robots" content="noindex, nofollow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">

    <style>
        :root { --bg:#0F0C09; --accent:#C9A96E; --text:#F5E6D3; --danger:#c0432f; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body {
            background:var(--bg); color:var(--text);
            font-family:'Outfit',system-ui,sans-serif; min-height:100vh;
            padding:1.5rem 1rem 4rem;
        }
        header { text-align:center; margin:0.5rem 0 1.5rem; }
        h1 { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:2rem; letter-spacing:.05em; }
        .sub { opacity:.55; font-size:.85rem; margin-top:.3rem; }

        .banner {
            max-width:1100px; margin:0 auto 1.4rem; padding:.7rem 1rem;
            font-size:.8rem; line-height:1.5; border-radius:10px;
            background:rgba(201,169,110,.1); border:1px solid rgba(201,169,110,.35);
            color:rgba(245,230,211,.85); text-align:center;
        }
        .toolbar {
            display:flex; align-items:center; justify-content:space-between;
            max-width:1100px; margin:0 auto 1.4rem; gap:1rem;
        }
        .count { opacity:.7; font-size:.9rem; }
        button {
            font-family:inherit; cursor:pointer; border:none; border-radius:999px;
            font-size:.82rem; padding:.5rem 1.1rem; transition:opacity .2s;
        }
        button:disabled { opacity:.5; cursor:default; }
        .btn-ghost { background:transparent; color:var(--text); border:1px solid rgba(245,230,211,.25); }
        .btn-ghost:hover { border-color:var(--accent); }

        .grid {
            display:grid; gap:14px; max-width:1100px; margin:0 auto;
            grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
        }
        figure {
            position:relative; border-radius:10px; overflow:hidden;
            background:#1a1712; border:1px solid rgba(245,230,211,.1);
            transition:opacity .3s;
        }
        figure.deleting { opacity:.4; pointer-events:none; }
        figure img { width:100%; aspect-ratio:3/4; object-fit:cover; display:block; }
        figcaption {
            padding:.5rem .6rem; font-size:.72rem; line-height:1.4;
            color:rgba(245,230,211,.65); word-break:break-all;
        }
        .btn-del {
            position:absolute; top:8px; right:8px;
            background:rgba(0,0,0,.6); color:#fff; border:1px solid rgba(192,67,47,.8);
            border-radius:999px; padding:.3rem .65rem; font-size:.72rem; backdrop-filter:blur(4px);
        }
        .btn-del:hover { background:var(--danger); }
        #state {
            text-align:center; opacity:.6; margin-top:2.5rem;
            font-weight:300; line-height:1.7; padding:0 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Panel de administración (local)</h1>
        <p class="sub">Matamoro's Wedding · gestión de la galería</p>
    </header>

    <div class="banner">
        🔒 Este panel corre <strong>solo en tu computadora</strong> y usa la clave
        <code>service_role</code>. No abras esta página en el sitio público ni subas
        <code>tools/admin-local.config.js</code> a GitHub.
    </div>

    <div class="toolbar">
        <span class="count" id="count">—</span>
        <button id="btn-refresh" class="btn-ghost">Actualizar</button>
    </div>

    <div id="grid" class="grid"></div>
    <p id="state" style="display:none"></p>

    <!-- Config pública (URL + bucket) y clave local (service_role) -->
    <script src="../assets/js/config.js"></script>
    <script src="admin-local.config.js"></script>
    <script src="admin-local.js"></script>
</body>
</html>
