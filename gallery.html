<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Galería — Matamoro's Wedding</title>
    <meta name="theme-color" content="#0F0C09">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@200;300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0F0C09;
            --accent: #C9A96E;
            --text: #F5E6D3;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', system-ui, sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem 4rem;
        }
        header { text-align: center; margin-bottom: 2.5rem; }
        .back {
            position: fixed; top: 1rem; left: 1rem; z-index: 10;
            color: var(--text); text-decoration: none; opacity: 0.75;
            font-size: 0.85rem; padding: 0.5rem 0.9rem;
            border: 1px solid rgba(245,230,211,0.25); border-radius: 999px;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(6px);
        }
        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 300; font-size: clamp(2rem, 6vw, 3rem);
            letter-spacing: 0.06em;
        }
        .couple {
            font-family: 'Pinyon Script', cursive;
            color: var(--accent); font-size: clamp(1.4rem, 5vw, 2rem);
            margin-top: -0.4rem;
        }
        .subtitle { opacity: 0.55; font-weight: 300; font-size: 0.9rem; margin-top: 0.4rem; }
        .grid {
            display: grid; gap: 14px; max-width: 1100px; margin: 0 auto;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        }
        figure {
            position: relative; border-radius: 10px; overflow: hidden;
            background: #1a1712; border: 1px solid rgba(245,230,211,0.1);
            aspect-ratio: 3 / 4;
        }
        figure img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .dl {
            position: absolute; bottom: 8px; right: 8px;
            color: var(--text); text-decoration: none;
            font-size: 0.72rem; padding: 0.35rem 0.7rem;
            border-radius: 999px; background: rgba(0,0,0,0.55);
            border: 1px solid rgba(201,169,110,0.5); backdrop-filter: blur(4px);
            opacity: 0; transition: opacity 0.2s;
        }
        figure:hover .dl, figure:focus-within .dl { opacity: 1; }
        @media (hover: none) { .dl { opacity: 1; } }
        #state {
            text-align: center; opacity: 0.6; margin-top: 3rem;
            font-weight: 300; line-height: 1.7;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">‹ Volver</a>

    <header>
        <h1>Matamoro's Wedding</h1>
        <p class="couple">Angel &amp; Clara</p>
        <p class="subtitle">Galería de la boda · 07 · 16 · 2026</p>
    </header>

    <div id="grid" class="grid"></div>
    <p id="state" style="display:none"></p>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/gallery.js"></script>
</body>
</html>
