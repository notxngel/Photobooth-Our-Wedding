<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin — Matamoro's Wedding</title>
    <meta name="theme-color" content="#0F0C09">
    <meta name="robots" content="noindex, nofollow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">

    <style>
        :root { --bg:#0F0C09; --accent:#C9A96E; --text:#F5E6D3; --danger:#c0432f; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body {
            background:var(--bg); color:var(--text);
            font-family:'Outfit',system-ui,sans-serif; min-height:100vh;
            padding:1.5rem 1rem 4rem;
        }
        header { text-align:center; margin:0.5rem 0 1.5rem; }
        h1 { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:1.9rem; letter-spacing:.05em; }
        .sub { opacity:.55; font-size:.85rem; margin-top:.3rem; }

        /* ── Pantalla de PIN ── */
        .gate {
            max-width:340px; margin:14vh auto 0; text-align:center;
            display:flex; flex-direction:column; gap:1.1rem;
        }
        .gate input {
            width:100%; background:transparent; color:var(--text);
            border:none; border-bottom:1px solid rgba(245,230,211,.3);
            padding:.6rem 0; font-size:1.05rem; font-family:inherit; text-align:center;
        }
        .gate input:focus { outline:none; border-bottom-color:var(--accent); }
        .gate .err { color:#e08a7a; font-size:.8rem; min-height:1.2em; }

        button {
            font-family:inherit; cursor:pointer; border:none; border-radius:999px;
            font-size:.82rem; padding:.55rem 1.2rem; transition:opacity .2s, border-color .2s;
        }
        button:disabled { opacity:.5; cursor:default; }
        .btn-gold  { background:var(--accent); color:#1a1206; font-weight:500; }
        .btn-ghost { background:transparent; color:var(--text); border:1px solid rgba(245,230,211,.25); }
        .btn-ghost:hover { border-color:var(--accent); }

        /* ── Panel ── */
        .toolbar {
            display:none; align-items:center; justify-content:space-between;
            max-width:1100px; margin:0 auto 1.4rem; gap:.8rem;
        }
        .count { opacity:.7; font-size:.9rem; }
        .grid {
            display:none; grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
            gap:14px; max-width:1100px; margin:0 auto;
        }
        figure {
            position:relative; border-radius:10px; overflow:hidden;
            background:#1a1712; border:1px solid rgba(245,230,211,.1);
            transition:opacity .3s;
        }
        figure.deleting { opacity:.4; pointer-events:none; }
        figure img { width:100%; aspect-ratio:3/4; object-fit:cover; display:block; }
        figcaption {
            padding:.5rem .6rem; font-size:.7rem; line-height:1.5;
            color:rgba(245,230,211,.65); word-break:break-all;
        }
        figcaption .sent { color:#9dc79a; }
        .btn-del {
            position:absolute; top:8px; right:8px;
            background:rgba(0,0,0,.6); color:#fff; border:1px solid rgba(192,67,47,.8);
            border-radius:999px; padding:.35rem .7rem; font-size:.72rem; backdrop-filter:blur(4px);
        }
        .btn-del:hover { background:var(--danger); }
        #state {
            text-align:center; opacity:.6; margin-top:2.5rem;
            font-weight:300; line-height:1.7; padding:0 1rem; display:none;
        }
    </style>
</head>
<body>
    <header>
        <h1>Panel de administración</h1>
        <p class="sub">Matamoro's Wedding · gestión de la galería</p>
    </header>

    <!-- Puerta: PIN -->
    <div class="gate" id="gate">
        <p style="opacity:.7; font-size:.9rem; line-height:1.6">
            Escribe el PIN de administración para gestionar las fotos de la galería.
        </p>
        <input type="password" id="pin-input" placeholder="PIN" autocomplete="current-password">
        <p class="err" id="pin-error"></p>
        <button class="btn-gold" id="btn-enter">Entrar</button>
    </div>

    <!-- Panel -->
    <div class="toolbar" id="toolbar">
        <span class="count" id="count">—</span>
        <div style="display:flex; gap:.6rem">
            <button id="btn-refresh" class="btn-ghost">Actualizar</button>
            <button id="btn-logout"  class="btn-ghost">Salir</button>
        </div>
    </div>
    <div id="grid" class="grid"></div>
    <p id="state"></p>

    <script src="assets/js/config.js"></script>
    <script>
    (function () {
        'use strict';

        const cfg    = window.PB_CONFIG || {};
        const FN_URL = `${cfg.SUPABASE_URL}/functions/v1/admin-photos`;
        const BUCKET = cfg.BUCKET || 'photos';

        const gate     = document.getElementById('gate');
        const toolbar  = document.getElementById('toolbar');
        const grid     = document.getElementById('grid');
        const stateEl  = document.getElementById('state');
        const countEl  = document.getElementById('count');
        const pinInput = document.getElementById('pin-input');
        const pinError = document.getElementById('pin-error');

        let PIN = '';
        try { PIN = sessionStorage.getItem('pb-admin-pin') || ''; } catch (_) {}

        function setState(msg) {
            stateEl.textContent = msg || '';
            stateEl.style.display = msg ? 'block' : 'none';
        }

        function showGate(errMsg) {
            gate.style.display = 'flex';
            toolbar.style.display = 'none';
            grid.style.display = 'none';
            setState('');
            pinError.textContent = errMsg || '';
        }

        function showPanel() {
            gate.style.display = 'none';
            toolbar.style.display = 'flex';
            grid.style.display = 'grid';
        }

        async function call(payload) {
            let res;
            try {
                res = await fetch(FN_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-admin-pin': PIN,
                        // Requerido por la puerta de entrada de Supabase (no es la
                        // autenticación real: la clave anon es pública por diseño).
                        // La autorización de verdad la hace el PIN dentro de la función.
                        apikey: cfg.SUPABASE_ANON_KEY,
                        Authorization: `Bearer ${cfg.SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify(payload)
                });
            } catch (_) {
                throw new Error('No se pudo contactar la función "admin-photos". ' +
                    '¿Ya está desplegada en Supabase? (ver docs/ADMIN.md)');
            }
            if (res.status === 401) {
                PIN = '';
                try { sessionStorage.removeItem('pb-admin-pin'); } catch (_) {}
                showGate('PIN incorrecto.');
                throw new Error('PIN incorrecto');
            }
            const data = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
            return data;
        }

        const publicUrl = p => `${cfg.SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${p}`;

        function setCount() {
            const n = grid.querySelectorAll('figure').length;
            countEl.textContent = `${n} foto${n === 1 ? '' : 's'}`;
        }

        function renderPhoto(row) {
            const fig = document.createElement('figure');

            const img = document.createElement('img');
            img.src = publicUrl(row.thumb_path || row.image_path);
            img.loading = 'lazy'; img.alt = 'Foto';

            const cap = document.createElement('figcaption');
            const when = new Date(row.created_at).toLocaleString();
            const mail = row.email || '(sin correo)';
            const sent = row.email && row.email_sent_at ? ' · <span class="sent">✓ enviada</span>' : '';
            cap.innerHTML = `${mail.replace(/</g, '&lt;')} · ${when}${sent}`;

            const del = document.createElement('button');
            del.className = 'btn-del'; del.textContent = 'Borrar';
            del.addEventListener('click', () => deletePhoto(row, fig, del));

            fig.append(img, cap, del);
            return fig;
        }

        async function loadPhotos() {
            setState('Cargando…'); grid.innerHTML = ''; countEl.textContent = '—';
            try {
                const rows = await call({ action: 'list' });
                showPanel();
                try { sessionStorage.setItem('pb-admin-pin', PIN); } catch (_) {}
                countEl.textContent = `${rows.length} foto${rows.length === 1 ? '' : 's'}`;
                if (!rows.length) { setState('No hay fotos todavía.'); return; }
                setState('');
                const frag = document.createDocumentFragment();
                rows.forEach(row => frag.appendChild(renderPhoto(row)));
                grid.appendChild(frag);
            } catch (err) {
                if (err.message !== 'PIN incorrecto') setState('Error: ' + err.message);
            }
        }

        async function deletePhoto(row, fig, btn) {
            if (!confirm('¿Borrar esta foto? Esta acción no se puede deshacer.')) return;
            btn.disabled = true; btn.textContent = 'Borrando…';
            fig.classList.add('deleting');
            try {
                await call({ action: 'delete', id: row.id });
                fig.remove();
                setCount();
                if (!grid.querySelectorAll('figure').length) setState('No hay fotos todavía.');
            } catch (err) {
                fig.classList.remove('deleting');
                btn.disabled = false; btn.textContent = 'Borrar';
                alert('No se pudo borrar: ' + err.message);
            }
        }

        document.getElementById('btn-enter').addEventListener('click', () => {
            PIN = pinInput.value.trim();
            if (!PIN) { pinError.textContent = 'Escribe el PIN.'; return; }
            pinError.textContent = '';
            loadPhotos();
        });
        pinInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('btn-enter').click();
        });
        document.getElementById('btn-refresh').addEventListener('click', loadPhotos);
        document.getElementById('btn-logout').addEventListener('click', () => {
            PIN = '';
            try { sessionStorage.removeItem('pb-admin-pin'); } catch (_) {}
            pinInput.value = '';
            showGate('');
        });

        // Si ya hay PIN en la sesión, entra directo
        if (PIN) loadPhotos(); else showGate('');
    })();
    </script>
</body>
</html>
