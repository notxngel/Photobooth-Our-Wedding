<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin — Matamoro's Wedding</title>
    <meta name="theme-color" content="#0F0C09">
    <meta name="robots" content="noindex, nofollow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">

    <style>
        :root { --bg:#0F0C09; --accent:#C9A96E; --text:#F5E6D3; --danger:#c0432f; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body {
            background:var(--bg); color:var(--text);
            font-family:'Outfit',system-ui,sans-serif; min-height:100vh;
            padding:1.5rem 1rem 4rem;
        }
        a.back {
            position:fixed; top:1rem; left:1rem; z-index:10;
            color:var(--text); text-decoration:none; opacity:.75; font-size:.85rem;
            padding:.45rem .85rem; border:1px solid rgba(245,230,211,.25);
            border-radius:999px; background:rgba(0,0,0,.3);
        }
        header { text-align:center; margin:1.5rem 0 2rem; }
        h1 { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:2rem; letter-spacing:.05em; }
        .sub { opacity:.55; font-size:.85rem; margin-top:.3rem; }

        /* Login */
        .card {
            max-width:380px; margin:3rem auto 0; padding:2rem 1.6rem;
            background:#15120d; border:1px solid rgba(245,230,211,.12); border-radius:16px;
        }
        .card h2 { font-family:'Cormorant Garamond',serif; font-weight:400; text-align:center; margin-bottom:1.4rem; }
        label { display:block; font-size:.78rem; opacity:.7; margin:0 0 .35rem; letter-spacing:.05em; }
        input {
            width:100%; padding:.7rem .8rem; margin-bottom:1rem;
            background:#0c0a07; border:1px solid rgba(245,230,211,.2); border-radius:8px;
            color:var(--text); font-size:1rem; font-family:inherit;
        }
        input:focus { outline:none; border-color:var(--accent); }
        button {
            font-family:inherit; cursor:pointer; border:none; border-radius:8px;
            font-size:.95rem; padding:.7rem 1rem; transition:opacity .2s;
        }
        button:disabled { opacity:.5; cursor:default; }
        .btn-primary { width:100%; background:var(--accent); color:#1a1208; font-weight:500; }
        .btn-ghost { background:transparent; color:var(--text); border:1px solid rgba(245,230,211,.25); }
        .msg { font-size:.82rem; text-align:center; min-height:1.2em; margin-top:.6rem; line-height:1.5; }
        .msg.error { color:#e08a7a; }

        /* Panel */
        #panel { display:none; }
        .toolbar {
            display:flex; align-items:center; justify-content:space-between;
            max-width:1100px; margin:0 auto 1.4rem; gap:1rem;
        }
        .count { opacity:.7; font-size:.9rem; }
        .grid {
            display:grid; gap:14px; max-width:1100px; margin:0 auto;
            grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
        }
        figure {
            position:relative; border-radius:10px; overflow:hidden;
            background:#1a1712; border:1px solid rgba(245,230,211,.1);
        }
        figure img { width:100%; aspect-ratio:3/4; object-fit:cover; display:block; }
        figcaption {
            padding:.5rem .6rem; font-size:.72rem; line-height:1.4;
            color:rgba(245,230,211,.65); word-break:break-all;
        }
        .btn-del {
            position:absolute; top:8px; right:8px;
            background:rgba(0,0,0,.6); color:#fff; border:1px solid rgba(192,67,47,.8);
            border-radius:999px; padding:.3rem .65rem; font-size:.72rem; backdrop-filter:blur(4px);
        }
        .btn-del:hover { background:var(--danger); }
        #state { text-align:center; opacity:.6; margin-top:2.5rem; font-weight:300; line-height:1.7; }
    </style>
</head>
<body>
    <a href="index.html" class="back">‹ Volver a la app</a>

    <header>
        <h1>Panel de administración</h1>
        <p class="sub">Matamoro's Wedding · gestión de la galería</p>
    </header>

    <!-- LOGIN -->
    <section id="login" class="card">
        <h2>Iniciar sesión</h2>
        <label for="email">Correo de administrador</label>
        <input type="email" id="email" autocomplete="username" placeholder="tu@correo.com">
        <label for="password">Contraseña</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••">
        <button id="btn-login" class="btn-primary">Entrar</button>
        <p id="login-msg" class="msg"></p>
    </section>

    <!-- PANEL -->
    <section id="panel">
        <div class="toolbar">
            <span class="count" id="count">—</span>
            <button id="btn-logout" class="btn-ghost">Cerrar sesión</button>
        </div>
        <div id="grid" class="grid"></div>
        <p id="state" style="display:none"></p>
    </section>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/admin.js"></script>
</body>
</html>
